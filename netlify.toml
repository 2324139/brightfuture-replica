[build]
command = "bun run build"
publish = "dist"

[build.environment]
NODE_VERSION = "18"

# 重定向規則 - SPA 路由
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# 緩存策略
[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.woff2"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
